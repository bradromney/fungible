name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    name: FungibleCore (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Build
        working-directory: apps/ios/FungibleCore
        run: swift build -v

      - name: Test
        working-directory: apps/ios/FungibleCore
        run: swift test -v
