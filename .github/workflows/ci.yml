name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    name: FungibleCore (build + test)
    runs-on: ubuntu-latest
    # Official Swift image so the toolchain is preinstalled and reliable.
    container: swift:5.9
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        working-directory: apps/ios/FungibleCore
        run: swift build -v
      - name: Test
        working-directory: apps/ios/FungibleCore
        run: swift test -v

  worker:
    name: Cloud worker (pytest)
    runs-on: ubuntu-latest
    container: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install test deps
        working-directory: services/worker
        run: pip install --no-cache-dir -r requirements-dev.txt
      - name: Test
        working-directory: services/worker
        run: pytest -q

  web:
    name: Web viewer (typecheck + test)
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - uses: actions/checkout@v4
      - name: Install
        working-directory: web/viewer
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: web/viewer
        run: npm run typecheck
      - name: Test
        working-directory: web/viewer
        run: npm test

  api:
    name: Sync/share API (typecheck + test)
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - uses: actions/checkout@v4
      - name: Install
        working-directory: services/api
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: services/api
        run: npm run typecheck
      - name: Test
        working-directory: services/api
        run: npm test

  app:
    name: FungibleApp (compile, Simulator)
    # macOS runner: the ARKit/Metal/SwiftUI app only compiles with Xcode. This
    # is a COMPILE check (build for the iOS Simulator SDK, no signing, no device)
    # — it catches SwiftUI/type errors the Linux core job can't. The live LiDAR
    # capture loop still needs a real device (see docs/device-build.md).
    # macos-15 ships Xcode 16, which can open the project format XcodeGen emits.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Tooling versions
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apps/ios/FungibleApp
        run: xcodegen generate
      - name: Build for iOS Simulator (compile only, no signing)
        working-directory: apps/ios/FungibleApp
        run: |
          xcodebuild build \
            -project FungibleApp.xcodeproj \
            -scheme FungibleApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
