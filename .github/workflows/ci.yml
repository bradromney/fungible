name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    name: FungibleCore (build + test)
    runs-on: ubuntu-latest
    # Use the official Swift image so the toolchain is preinstalled and we don't
    # depend on a toolchain-fetch action (which 404'd on the hosted runner).
    container: swift:5.9
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        working-directory: apps/ios/FungibleCore
        run: swift build -v

      - name: Test
        working-directory: apps/ios/FungibleCore
        run: swift test -v
