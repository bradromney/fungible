name = "fungible-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Object storage for point-cloud / mesh blobs (no egress fees on R2).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "fungible-scans"

# Metadata catalog (sets, shares). Provisioned 2026-06-04.
[[d1_databases]]
binding = "DB"
database_name = "fungible"
database_id = "cc401444-b302-4e49-accc-d888bd49e5be"
